name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'New Features'
    labels: [feature, enhancement]
  - title: 'Bug Fixes'
    labels: [fix, bug, bugfix]
  - title: 'Maintenance'
    labels: [chore, maintenance, dependencies]

change-template: '- $TITLE (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: [major, breaking]
  minor:
    labels: [feature, enhancement, minor]
  patch:
    labels: [fix, bug, chore, patch]
  default: patch

template: |
  ## What's changed

  $CHANGES
